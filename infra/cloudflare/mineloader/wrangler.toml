# Edge: mineloader.grudge-studio.com → Mine-Loader SPA on Vercel
#
# Production host for GRUDOX Realms / Mine-Loader. Never Replit.
#
# Deploy (Cloudflare account with grudge-studio.com zone):
#   cd infra/cloudflare/mineloader && npx wrangler deploy
#
# Origin: set Vercel project production domain (default mineloader.vercel.app).
# After first Vercel deploy of the Mine-Loader SPA, attach custom domain
# mineloader.grudge-studio.com either via this Worker OR Vercel custom domain.
# Worker is preferred when you need CF edge + single scheme with open./grudox.

name = "mineloader-edge-proxy"
main = "src/index.js"
compatibility_date = "2024-11-01"

[[routes]]
pattern = "mineloader.grudge-studio.com"
custom_domain = true
