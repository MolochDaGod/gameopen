# Railway fallback if Dockerfile is not selected in the dashboard.
# Prefer Dockerfile (ships content/ for /api/content/*).
[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["echo no-install-standalone"]

[phases.build]
cmds = ["echo using-standalone-api"]

[start]
cmd = "node server/standalone.mjs"
