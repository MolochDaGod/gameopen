name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: artifacts/animator/package-lock.json

      - name: Install animator deps
        working-directory: artifacts/animator
        run: npm install --no-fund --no-audit --legacy-peer-deps

      - name: Unit tests (retarget, annihilate hero)
        working-directory: artifacts/animator
        run: npm run test -- src/three/retargetMap.test.ts src/lib/annihilateHero.test.ts

      - name: Typecheck animator
        working-directory: artifacts/animator
        run: npm run typecheck
        continue-on-error: true

      - name: Production build
        run: node scripts/vercel-build.mjs
        env:
          BASE_PATH: /

      - name: Assert SPA output exists
        run: |
          test -f artifacts/animator/dist/public/index.html
          echo "SPA output OK"

  smoke-production:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Smoke Open production
        run: node scripts/smoke-prod.mjs --base https://open.grudge-studio.com
        continue-on-error: true
      - name: Anim pack readiness (warn-only)
        run: node scripts/readiness-anim-packs.mjs --base https://open.grudge-studio.com
        continue-on-error: true
